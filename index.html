// ── API ──────────────────────────────────────────────────────────
const claude=async(system,userText,images=[],maxTokens=4000)=>{
  const content=[];
  for(const img of images)
    content.push({type:"image",source:{type:"base64",media_type:img.mime,data:img.b64}});
  content.push({type:"text",text:userText});
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:maxTokens,system,messages:[{role:"user",content}]})
  });
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  return d.content[0].text;
};
const toB64=f=>new Promise((res,rej)=>{
  const r=new FileReader();
  r.onload=()=>res({b64:r.result.split(",")[1],mime:f.type});
  r.onerror=rej;r.readAsDataURL(f);
});

const VISION_SYS=`You are a precision document data extractor for Indian legal documents.
Extract ALL visible text from the image carefully and return ONLY a valid JSON object — no markdown, no explanation, no extra text.
Use these exact keys (empty string "" if not found):
{"naam_hi":"","naam_en":"","aadhaar_no":"","pan_no":"","dob":"","age":"","gender":"",
"father_naam":"","mother_naam":"","spouse_naam":"","address_full":"","pincode":"",
"village":"","taluka":"","jila":"","state":"",
"vehicle_no":"","vehicle_make_model":"","vehicle_year":"","engine_no":"","chassis_no":"",
"survey_no":"","gat_no":"","area_hectare":"","area_guntha":"","mauza":"","malik_naam":"",
"khata_no":"","ration_no":"","extra":""}`;

const docSys=(cat,stype)=>`You are a senior Maharashtra legal document expert and advocate.
Write complete, enforceable legal documents in formal Marathi (Devanagari script).
Applicable laws: ${LAWS[stype]||"Notary Act 1952, Indian Contract Act 1872"}

STRICT RULES:
1. Begin DIRECTLY with document title — no intro or explanation from you
2. Write entirely in formal legal Marathi throughout
3. Include ALL mandatory clauses for this document type valid in Maharashtra courts
4. Signature blanks: __________________________
5. Date blanks: दिनांक: ________ / ________ / 20____
6. Include proper साक्षीदार (witness) section at end
7. For affidavits: include proper oath text per Notary Act 1952
8. For agreements: include penalty/dispute clause, jurisdiction (Maharashtra courts), stamp duty clause
9. Document must be print-ready, professional, complete, legally sound
10. After signature block add: [नोटरी / सक्षम अधिकारी यांचा शिक्का व सही]`;

// ── MAIN APP ─────────────────────────────────────────────────────
function App(){
  const [step,setStep]=useState("home");
  const [cat,setCat]=useState(null);
  const [stype,setStype]=useState(null);
  const [otherTopic,setOtherTopic]=useState("");
  const [scanned,setScanned]=useState([]);
  const [flds,setFlds]=useState({});
  const [clauses,setClauses]=useState([]);
  const [newC,setNewC]=useState("");
  const [docTxt,setDocTxt]=useState("");
  const [loading,setLoading]=useState(false);
  const [loadMsg,setLoadMsg]=useState("");
  const [scanId,setScanId]=useState(null);
  const [err,setErr]=useState("");
  const fileRefs=useRef({});

  const mergeScanned=arr=>{
    const m={};
    for(const s of arr){
      const pfx=s.id.includes("p2")?"p2_":s.id==="rc"?"v_":s.id==="doc712"?"prop_":"p1_";
      for(const [k,v] of Object.entries(s.fields||{}))
        if(v&&k!=="extra") m[pfx+k]=v;
    }
    return m;
  };

  const doScan=async(sdoc,file)=>{
    setScanId(sdoc.id);setErr("");
    try{
      const img=await toB64(file);
      const preview=URL.createObjectURL(file);
      const raw=await claude(VISION_SYS,`Document: ${sdoc.label}. Extract carefully.`,[img],1200);
      let fields={};
      try{fields=JSON.parse(raw.replace(/```json|```/g,"").trim());}
      catch{fields={extra:raw};}
      const upd=[...scanned.filter(s=>s.id!==sdoc.id),
        {id:sdoc.id,label:sdoc.label,emoji:sdoc.emoji,fields,preview}];
      setScanned(upd);
      setFlds(prev=>({...prev,...mergeScanned(upd)}));
    }catch(e){setErr("स्कॅन अयशस्वी: "+e.message);}
    setScanId(null);
  };

  const generate=async()=>{
    setLoading(true);setErr("");
    setLoadMsg("दस्तावेज़ तयार होत आहे... १०-१५ सेकंद प्रतीक्षा करा...");
    try{
      const fText=Object.entries(flds).filter(([,v])=>v)
        .map(([k,v])=>`${FIELD_LABELS[k]||k}: ${v}`).join("\n");
      const clauseTxt=clauses.length
        ?"\nक्लायंटच्या विशेष अटी:\n"+clauses.map((c,i)=>`${i+1}. ${c}`).join("\n"):"";
      const subObj=(SUBS[cat]||[]).find(s=>s.id===stype);
      const subLabel=stype==="other"?otherTopic:(subObj?.label||stype);
      const prompt=`दस्तावेज़ प्रकार: ${CATS.find(c=>c.id===cat)?.label} — ${subLabel}

पक्ष / मालमत्ता माहिती:
${fText||"(माहिती उपलब्ध नाही — रिकाम्या जागा __________ सोडाव्यात)"}
${clauseTxt}

संपूर्ण, सही करण्यास तयार, कायदेशीर दस्तावेज़ लिहा. महाराष्ट्र न्यायालयात वैध असावे.`;
      const result=await claude(docSys(cat,stype),prompt,[],4000);
      setDocTxt(result);setStep("preview");
    }catch(e){setErr("चूक: "+e.message);}
    setLoading(false);
  };

  const printDoc=()=>{
    const catLabel=CATS.find(c=>c.id===cat)?.label||"दस्तावेज़";
    const win=window.open("","_blank");
    win.document.write(`<!DOCTYPE html><html lang="mr"><head>
<meta charset="UTF-8"><title>${catLabel}</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+Devanagari:wght@400;500;600;700&display=swap">

.bar button{padding:8px 20px;font-size:13pt;cursor:pointer;border:none;border-radius:6px;font-family:inherit;font-weight:600}

.cb{background:#eee;color:#444}
.info{font-size:10pt;color:#666;flex:1}

  width:21cm;min-height:29.7cm;margin:10px auto;background:white;
  padding-top:18.5cm;padding-left:2.5cm;padding-right:1.5cm;padding-bottom:1.27cm;
}

  <button class="cb" onclick="window.close()">✕ बंद</button>
  <div class="info">⚠️ Printer: Margins=None • Scale=100% • Headers/Footers=Off</div>
</div>
<div class="page"><div class="doc">${docTxt.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}</div></div>
</body></html>`);
    win.document.close();
  };

  const ErrBox=()=>err?<div style={{background:T.red,color:T.redL,padding:"10px 14px",borderRadius:"8px",margin:"8px 0",fontSize:"12px"}}>⚠️ {err}</div>:null;

  // ── HOME ────────────────────────────────────────────────────────
  if(step==="home")return(
    <div style={{minHeight:"100vh",background:T.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px",fontFamily:F,animation:"fadeIn .5s ease"}}>
      <div style={{fontSize:"52px",marginBottom:"10px"}}>⚖️</div>
      <h1 style={{color:T.gold,fontSize:"22px",fontWeight:700,margin:"0 0 6px",textAlign:"center",fontFamily:F}}>महाराष्ट्र दस्तावेज़ एजंट</h1>
      <p style={{color:T.dim,fontSize:"12px",marginBottom:"16px",textAlign:"center"}}>Vision Scanner • AI Writer • Stamp Paper Format</p>
      <div style={{display:"flex",gap:"8px",flexWrap:"wrap",justifyContent:"center",marginBottom:"28px"}}>
        {["📷 आधार/PAN स्कॅन","🤖 AI दस्तावेज़","⚖️ महाराष्ट्र कायदा","🖨️ प्रिंट-रेडी"].map(t=><Tag key={t}>{t}</Tag>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"14px",maxWidth:"480px",width:"100%"}}>
        {CATS.map(c=>(
          <Card key={c.id} onClick={()=>{setCat(c.id);setStep("subtype");}}>
            <div style={{fontSize:"32px",textAlign:"center",marginBottom:"8px"}}>{c.emoji}</div>
            <div style={{color:T.gold,fontWeight:600,fontSize:"13px",textAlign:"center",lineHeight:1.4}}>{c.label}</div>
            <div style={{color:T.dim,fontSize:"10px",textAlign:"center",marginTop:"4px"}}>{c.sub}</div>
          </Card>
        ))}
      </div>
      <p style={{color:T.dim2,fontSize:"10px",marginTop:"28px",textAlign:"center",maxWidth:"360px",lineHeight:1.7}}>
        आधार, PAN, RC Book, ७/१२ स्कॅन करा → AI दस्तावेज़ तयार करतो → स्टांप पेपरवर प्रिंट
      </p>
    </div>
  );

  // ── SUBTYPE ─────────────────────────────────────────────────────
  if(step==="subtype")return(
    <div style={{minHeight:"100vh",background:T.bg,fontFamily:F,color:T.cream}}>
      <div style={{background:T.surf,borderBottom:`1px solid ${T.bdr}`,padding:"12px 16px",display:"flex",gap:"10px",alignItems:"center"}}>
        <Btn sec sm onClick={()=>setStep("home")}>← मागे</Btn>
        <div>
          <div style={{color:T.gold,fontWeight:600,fontSize:"15px"}}>{CATS.find(c=>c.id===cat)?.label}</div>
          <div style={{color:T.dim,fontSize:"11px"}}>दस्तावेज़ प्रकार निवडा</div>
        </div>
      </div>
      <div style={{maxWidth:"560px",margin:"0 auto",padding:"20px 16px",display:"flex",flexDirection:"column",gap:"10px"}}>
        {(SUBS[cat]||[]).map(s=>(
          <Card key={s.id} onClick={()=>{setStype(s.id);if(s.id!=="other")setStep("scan");}}>
            <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
              <div style={{flex:1,fontSize:"15px",color:T.cream}}>{s.label}</div>
              {s.law&&<div style={{fontSize:"9px",color:T.gold+"66",maxWidth:"140px",textAlign:"right",lineHeight:1.5}}>{s.law}</div>}
              <div style={{color:T.gold,fontSize:"18px"}}>›</div>
            </div>
          </Card>
        ))}
        {stype==="other"&&(
          <div style={{padding:"14px",background:T.surf,border:`1px solid ${T.bdr}`,borderRadius:"12px"}}>
            <Lbl>शपथपत्राचा विषय लिहा:</Lbl>
            <Inp value={otherTopic} onChange={e=>setOtherTopic(e.target.value)} placeholder="उदा: मालमत्ता हस्तांतरण, बँक खाते..."/>
            <div style={{marginTop:"10px"}}><Btn onClick={()=>setStep("scan")} disabled={!otherTopic.trim()}>पुढे →</Btn></div>
          </div>
        )}
      </div>
    </div>
  );

  // ── SCAN ────────────────────────────────────────────────────────
  if(step==="scan")return(
    <div style={{minHeight:"100vh",background:T.bg,fontFamily:F,color:T.cream}}>
      <div style={{background:T.surf,borderBottom:`1px solid ${T.bdr}`,padding:"12px 16px",display:"flex",gap:"10px",alignItems:"center"}}>
        <Btn sec sm onClick={()=>setStep("subtype")}>← मागे</Btn>
        <div style={{flex:1}}>
          <div style={{color:T.gold,fontWeight:600,fontSize:"14px"}}>📷 कागदपत्रे स्कॅन करा</div>
          <div style={{color:T.dim,fontSize:"11px"}}>फोटो काढा — AI माहिती आपोआप काढेल</div>
        </div>
        <Btn onClick={()=>setStep("fields")} style={{padding:"8px 14px",fontSize:"12px"}}>पुढे →</Btn>
      </div>
      <div style={{maxWidth:"580px",margin:"0 auto",padding:"14px 14px"}}>
        <ErrBox/>
        <div style={{background:T.goldD,border:`1px solid ${T.gold}33`,borderRadius:"10px",padding:"10px 14px",marginBottom:"14px",fontSize:"12px",color:T.cream+"bb",lineHeight:1.8}}>
          📸 <b style={{color:T.gold}}>📷 स्कॅन</b> बटण दाबा → फोटो काढा → AI माहिती काढेल &nbsp;|&nbsp; स्कॅन न करताही <b style={{color:T.gold}}>पुढे</b> जाता येते
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:"8px",marginBottom:"20px"}}>
          {SCAN_DOCS.map(sd=>{
            const done=scanned.find(s=>s.id===sd.id);
            const isScanning=scanId===sd.id;
            const fc=done?Object.values(done.fields||{}).filter(v=>v&&v!=="").length:0;
            return(
              <div key={sd.id} style={{
                background:done?T.surf2:T.surf,
                border:`1.5px solid ${done?T.gold:T.bdr}`,
                borderRadius:"12px",padding:"10px 12px",
                display:"flex",alignItems:"center",gap:"10px"
              }}>
                {done
                  ?<img src={done.preview} style={{width:"44px",height:"44px",borderRadius:"6px",objectFit:"cover",flexShrink:0}}/>
                  :<div style={{width:"44px",height:"44px",borderRadius:"6px",background:T.inp,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"22px",flexShrink:0}}>{sd.emoji}</div>
                }
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:"13px",color:done?T.gold:T.cream,fontWeight:done?600:400}}>{sd.label}</div>
                  {done&&<div style={{fontSize:"10px",color:"#7fc97f",marginTop:"2px"}}>✓ {fc} माहिती मिळाली</div>}
                  {!done&&sd.hint&&<div style={{fontSize:"10px",color:T.dim}}>{sd.hint}</div>}
                </div>
                <div style={{flexShrink:0}}>
                  {isScanning
                    ?<div style={{color:T.gold,fontSize:"11px",minWidth:"72px",textAlign:"center",animation:"pulse 1s infinite"}}>⏳ स्कॅन...</div>
                    :<>
                      <input type="file" accept="image/*" capture="environment"
                        ref={el=>fileRefs.current[sd.id]=el}
                        style={{display:"none"}}
                        onChange={e=>{if(e.target.files[0])doScan(sd,e.target.files[0]);e.target.value="";}}
                      />
                      <Btn sm onClick={()=>fileRefs.current[sd.id]?.click()}
                        style={{background:done?T.surf:T.gold,color:done?T.cream:"#111",border:done?`1px solid ${T.bdr}`:"none"}}>
                        {done?"🔄":"📷"} {done?"बदला":"स्कॅन"}
                      </Btn>
                    </>
                  }
                </div>
              </div>
            );
          })}
        </div>
        <div style={{textAlign:"center",paddingBottom:"30px"}}>
          <Btn onClick={()=>setStep("fields")} style={{padding:"12px 32px",fontSize:"14px"}}>
            माहिती तपासा → {scanned.length>0?`(${scanned.length} स्कॅन केले)`:""}
          </Btn>
          <div style={{color:T.dim,fontSize:"11px",marginTop:"8px"}}>स्कॅन न करताही पुढे जाता येते — माहिती हाताने भरता येते</div>
        </div>
      </div>
    </div>
  );

  // ── FIELDS ──────────────────────────────────────────────────────
  if(step==="fields"){
    const groups=FIELD_GROUPS[cat]||FIELD_GROUPS.affidavit;
    const allGroupKeys=Object.values(groups).flat();
    const extraKeys=Object.keys(flds).filter(k=>!allGroupKeys.includes(k)&&flds[k]);
    return(
      <div style={{minHeight:"100vh",background:T.bg,fontFamily:F,color:T.cream}}>
        <div style={{background:T.surf,borderBottom:`1px solid ${T.bdr}`,padding:"12px 16px",display:"flex",gap:"10px",alignItems:"center",flexWrap:"wrap",position:"sticky",top:0,zIndex:10}}>
          <Btn sec sm onClick={()=>setStep("scan")}>← मागे</Btn>
          <div style={{flex:1}}>
            <div style={{color:T.gold,fontWeight:600,fontSize:"14px"}}>माहिती तपासा व अटी जोडा</div>
            <div style={{color:T.dim,fontSize:"11px"}}>स्कॅन केलेली माहिती बदलता येते</div>
          </div>
          <Btn onClick={generate} disabled={loading} style={{padding:"8px 18px",fontSize:"12px"}}>
            {loading?"⏳ तयार...":"⚡ दस्तावेज़ तयार करा"}
          </Btn>
        </div>
        <div style={{maxWidth:"680px",margin:"0 auto",padding:"16px"}}>
          <ErrBox/>
          {Object.entries(groups).map(([grpLabel,keys])=>(
            <div key={grpLabel} style={{marginBottom:"20px"}}>
              <div style={{color:T.gold,fontSize:"12px",fontWeight:600,marginBottom:"10px",
                padding:"5px 12px",background:T.goldD,borderRadius:"6px",display:"inline-block"}}>
                {grpLabel}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
                {keys.map(k=>(
                  <div key={k}>
                    <Lbl>{FIELD_LABELS[k]||k}</Lbl>
                    <Inp value={flds[k]||""} onChange={e=>setFlds({...flds,[k]:e.target.value})} placeholder={FIELD_LABELS[k]||k}/>
                  </div>
                ))}
              </div>
            </div>
          ))}
          {extraKeys.length>0&&(
            <div style={{marginBottom:"20px"}}>
              <div style={{color:T.gold,fontSize:"12px",fontWeight:600,marginBottom:"10px",
                padding:"5px 12px",background:T.goldD,borderRadius:"6px",display:"inline-block"}}>
                स्कॅनमधील इतर माहिती
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
                {extraKeys.map(k=>(
                  <div key={k}>
                    <Lbl>{k}</Lbl>
                    <Inp value={flds[k]||""} onChange={e=>setFlds({...flds,[k]:e.target.value})} placeholder={k}/>
                  </div>
                ))}
              </div>
            </div>
          )}
          {/* Custom Clauses */}
          <div style={{background:T.surf,border:`1px solid ${T.bdr}`,borderRadius:"12px",padding:"16px",marginBottom:"20px"}}>
            <div style={{color:T.gold,fontWeight:600,fontSize:"13px",marginBottom:"4px"}}>📌 विशेष अटी — क्लायंटनुसार</div>
            <div style={{color:T.dim,fontSize:"11px",marginBottom:"12px"}}>या अटी AI दस्तावेज़ात योग्य ठिकाणी जोडेल</div>
            {clauses.map((c,i)=>(
              <div key={i} style={{display:"flex",gap:"8px",marginBottom:"8px",alignItems:"flex-start"}}>
                <div style={{flex:1,background:T.inp,border:`1px solid ${T.bdr}`,borderRadius:"8px",
                  padding:"8px 12px",fontSize:"12px",color:T.cream,lineHeight:1.7}}>
                  <span style={{color:T.gold,fontSize:"10px"}}>अट {i+1}: </span>{c}
                </div>
                <button onClick={()=>setClauses(clauses.filter((_,j)=>j!==i))}
                  style={{background:T.red,color:T.redL,border:"none",borderRadius:"6px",
                    padding:"6px 10px",cursor:"pointer",fontSize:"14px",flexShrink:0}}>✕</button>
              </div>
            ))}
            <div style={{display:"flex",gap:"8px",marginTop:"8px"}}>
              <Inp value={newC} onChange={e=>setNewC(e.target.value)} multiline
                placeholder="उदा: वाहनावरील सर्व देणी विक्रेत्याने भरावीत / भाड्याची रक्कम दर महिन्याच्या ५ तारखेला द्यावी..."/>
              <Btn onClick={()=>{if(newC.trim()){setClauses([...clauses,newC.trim()]);setNewC("")}}}
                style={{alignSelf:"flex-start",padding:"8px 14px",flexShrink:0}}>
                + जोडा
              </Btn>
            </div>
          </div>
          <div style={{textAlign:"center",paddingBottom:"30px"}}>
            <Btn onClick={generate} disabled={loading} style={{padding:"14px 36px",fontSize:"15px"}}>
              {loading?"⏳ "+loadMsg:"⚡ दस्तावेज़ तयार करा"}
            </Btn>
            {loading&&<div style={{color:T.dim,fontSize:"11px",marginTop:"8px",animation:"pulse 1.5s infinite"}}>AI लिहित आहे... कृपया प्रतीक्षा करा</div>}
            {err&&<div style={{color:T.redL,fontSize:"12px",marginTop:"10px"}}>⚠️ {err}</div>}
          </div>
        </div>
      </div>
    );
  }

  // ── PREVIEW ─────────────────────────────────────────────────────
  if(step==="preview")return(
    <div style={{minHeight:"100vh",background:T.bg,fontFamily:F,color:T.cream}}>
      <div style={{background:T.surf,borderBottom:`1px solid ${T.bdr}`,padding:"12px 16px",
        display:"flex",gap:"8px",alignItems:"center",flexWrap:"wrap",position:"sticky",top:0,zIndex:10}}>
        <Btn sec sm onClick={()=>setStep("fields")}>← संपादित करा</Btn>
        <Btn sec sm onClick={generate} disabled={loading} style={{fontSize:"11px"}}>🔄 पुन्हा तयार करा</Btn>
        <Btn sec sm onClick={()=>setStep("home")}>🏠 होम</Btn>
        <div style={{flex:1}}/>
        <div style={{color:T.dim,fontSize:"10px",textAlign:"right",lineHeight:1.6}}>
          A4 स्टांप पेपर फॉर्मेट<br/>वरून 18.5cm रिकामे
        </div>
        <Btn onClick={printDoc} style={{padding:"10px 20px",fontSize:"13px"}}>
          🖨️ प्रिंट / डाउनलोड
        </Btn>
      </div>
      <div style={{maxWidth:"720px",margin:"0 auto",padding:"16px"}}>
        <div style={{background:T.goldD,border:`1px solid ${T.gold}33`,borderRadius:"10px",
          padding:"10px 16px",marginBottom:"14px",fontSize:"12px",color:T.cream+"bb",display:"flex",gap:"10px",alignItems:"center"}}>
          <span style={{fontSize:"20px"}}>📄</span>
          <span><b style={{color:T.gold}}>प्रिंट सेटिंग:</b> Margins=None • Scale=100% • Headers/Footers=Off • A4 स्टांप पेपर सरळ घाला — वरचे 18.5cm आपोआप रिकामे राहील</span>
        </div>
        <div style={{background:"#fffef9",borderRadius:"12px",padding:"24px 28px",
          color:"#1a1a1a",fontFamily:F,fontSize:"13px",lineHeight:2.2,whiteSpace:"pre-wrap",
          maxHeight:"72vh",overflowY:"auto",border:`1px solid ${T.bdr}`}}>
          <div style={{background:"#f0e8d0",padding:"8px 16px",borderRadius:"6px",
            marginBottom:"20px",fontSize:"10px",color:"#888",textAlign:"center",fontStyle:"italic"}}>
            ↑ वरील 18.5 cm रिकामे — प्री-प्रिंटेड स्टांप पेपर (हे प्रिंटमध्ये दिसणार नाही) ↑
          </div>
          {docTxt}
        </div>
      </div>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
